<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Agent</title>
    <style>
        body {
            width: 350px;
            min-height: 400px;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .tab.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        #extractBtn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 15px;
        }
        #extractBtn:hover {
            transform: translateY(-2px);
        }
        #extractBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .config-section {
            margin-bottom: 20px;
        }
        .config-section h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #f0f0f0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #e0e0e0;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            box-sizing: border-box;
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #56ab2f, #a8e6cf);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .save-btn:hover {
            transform: translateY(-1px);
        }
        .save-btn.secondary {
            background: linear-gradient(45deg, #2196F3, #64B5F6);
            margin-top: 10px;
        }
        #results {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            line-height: 1.4;
            min-height: 80px;
            white-space: pre-wrap;
        }
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .loader::after {
            content: "⏳ Extracting profile data...";
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .help-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }
        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .status.success {
            background: rgba(76, 175, 80, 0.3);
            color: #c8e6c9;
        }
        .status.error {
            background: rgba(244, 67, 54, 0.3);
            color: #ffcdd2;
        }
        .status.info {
            background: rgba(33, 150, 243, 0.3);
            color: #bbdefb;
        }
        .resume-upload-area {
            margin: 20px 0;
        }
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }
        .upload-zone:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
        }
        .upload-zone.drag-over {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .upload-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .upload-subtitle {
            font-size: 12px;
            opacity: 0.7;
        }
        .resume-analysis {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .resume-insights {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            font-size: 12px;
            line-height: 1.4;
        }
        .resume-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .ai-config {
            margin: 20px 0;
        }
        .ai-config textarea {
            width: 100%;
            min-height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            padding: 10px;
            font-size: 12px;
            resize: vertical;
            font-family: inherit;
        }
        .ai-config textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .ai-status {
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 LinkedIn Agent</h1>
        
        <div class="tabs">
            <div class="tab active" data-tab="extract">Extract</div>
            <div class="tab" data-tab="resume">Resume AI</div>
            <div class="tab" data-tab="settings">Settings</div>
        </div>

        <div id="extract-tab" class="tab-content active">
            <button id="extractBtn">Extract Profile Data</button>
            <div id="loader" class="loader"></div>
            <div id="results"></div>
        </div>

        <div id="resume-tab" class="tab-content">
            <div class="config-section">
                <h3>🧠 Resume AI Intelligence</h3>
                <div class="resume-upload-area">
                    <div class="upload-zone" id="uploadZone">
                        <div class="upload-icon">📄</div>
                        <div class="upload-text">
                            <div class="upload-title">Upload Your Resume</div>
                            <div class="upload-subtitle">Drag & drop or click to upload (PDF, DOC, TXT)</div>
                        </div>
                        <input type="file" id="resumeFileInput" accept=".pdf,.doc,.docx,.txt" style="display: none;">
                    </div>
                </div>
                
                <div id="resumeAnalysis" class="resume-analysis" style="display: none;">
                    <h4>📊 Resume Analysis</h4>
                    <div id="resumeInsights" class="resume-insights"></div>
                    <div class="resume-actions">
                        <button id="analyzeResumeBtn" class="save-btn secondary">🔍 Deep Analysis</button>
                        <button id="clearResumeBtn" class="save-btn secondary">🗑️ Clear Resume</button>
                    </div>
                </div>

                <div class="ai-config">
                    <h4>🤖 AI Configuration</h4>
                    <div class="input-group">
                        <label for="personalValue">Your Professional Value Proposition:</label>
                        <textarea id="personalValue" placeholder="e.g., Senior Product Manager with 5+ years leading cross-functional teams, specializing in user-centered design and growth strategies..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="careerGoals">Career Goals & Interests:</label>
                        <textarea id="careerGoals" placeholder="e.g., Seeking leadership roles in fintech, interested in AI/ML applications, passionate about scaling teams..."></textarea>
                    </div>
                    <button id="saveAIConfigBtn" class="save-btn">💾 Save AI Configuration</button>
                </div>
                
                <div id="aiStatus" class="ai-status"></div>
            </div>
        </div>

        <div id="settings-tab" class="tab-content">
            <div class="config-section">
                <h3>📊 Google Sheets Integration</h3>
                <div class="checkbox-group">
                    <input type="checkbox" id="enableGoogleSheets">
                    <label for="enableGoogleSheets">Enable Google Sheets Export</label>
                </div>
                
                <div class="input-group">
                    <label for="apiKey">Google Sheets API Key:</label>
                    <input type="password" id="apiKey" placeholder="Enter your Google Sheets API key">
                    <div class="help-text">Get from Google Cloud Console</div>
                </div>
                
                <div class="input-group">
                    <label for="spreadsheetId">Spreadsheet ID:</label>
                    <input type="text" id="spreadsheetId" placeholder="Enter your spreadsheet ID">
                    <div class="help-text">Found in your Google Sheets URL</div>
                </div>
                
                <div class="input-group">
                    <label for="sheetName">Sheet Name:</label>
                    <input type="text" id="sheetName" placeholder="Sheet1" value="Sheet1">
                </div>
                
                <button id="saveConfig" class="save-btn">💾 Save Configuration</button>
                <button id="testConnection" class="save-btn secondary">🔧 Test Connection</button>
                <div id="configStatus"></div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
